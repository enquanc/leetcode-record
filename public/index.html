<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetCode 刷題紀錄</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>LeetCode 刷題紀錄</h1>

  <form id="record-form">
    <div class="form-row">
      <input type="text" id="title" placeholder="題目名稱" required>
      <select id="difficulty" required>
        <option value="" disabled selected>難度</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
    </div>
    <div class="form-row">
      <input type="text" id="tags" placeholder="分類/標籤 (例如 Array, DP)">
      <input type="date" id="date" required>
    </div>
    <div class="form-row">
      <select id="status" required>
        <option value="" disabled selected>狀態</option>
        <option value="AC">AC 通過</option>
        <option value="未通過">未通過</option>
        <option value="複習中">複習中</option>
      </select>
      <input type="number" id="timeSpent" placeholder="花費時間 (分鐘)" min="0">
    </div>
    <button type="submit" id="submit-btn">新增紀錄</button>
    <input type="hidden" id="edit-id">
  </form>

  <div class="stats" id="stats"></div>

  <div class="filters">
    <input type="text" id="search" placeholder="搜尋題目名稱或標籤">
    <select id="filter-difficulty">
      <option value="">全部難度</option>
      <option value="Easy">Easy</option>
      <option value="Medium">Medium</option>
      <option value="Hard">Hard</option>
    </select>
    <select id="filter-status">
      <option value="">全部狀態</option>
      <option value="AC">AC 通過</option>
      <option value="未通過">未通過</option>
      <option value="複習中">複習中</option>
    </select>
  </div>

  <table id="record-table">
    <thead>
      <tr>
        <th data-sort="title">題目</th>
        <th data-sort="difficulty">難度</th>
        <th data-sort="tags">標籤</th>
        <th data-sort="date">日期</th>
        <th data-sort="status">狀態</th>
        <th data-sort="timeSpent">時間(分)</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="record-body"></tbody>
  </table>
</div>
<script src="app.js"></script>
</body>
</html>
